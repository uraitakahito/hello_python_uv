name: Hadolint

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'Dockerfile.dev'
      - 'Dockerfile.release'
      - '.hadolint.yaml'
  pull_request:
    paths:
      - 'Dockerfile.dev'
      - 'Dockerfile.release'
      - '.hadolint.yaml'

jobs:
  hadolint:
    name: Lint ${{ matrix.dockerfile }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - Dockerfile.dev
          - Dockerfile.release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
